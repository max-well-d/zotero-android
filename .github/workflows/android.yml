name: Zotero Android Release

on:
  push:
    tags:
      - 'release-v*'

env:
  ANDROID_PUBLISHER_CREDENTIALS: ${{ secrets.ANDROID_PUBLISHER_CREDENTIALS }}

jobs:
  build-and-deploy-release:
    if: startsWith(github.ref, 'refs/tags/release-v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Write PSPDFKIT key
        run: echo "${{ secrets.PSPDFKIT_KEY }}" | sed 's/./& /g' > pspdfkit-key.txt

      - name: Decrypt keystore
        run: openssl aes-256-cbc -d -in .github/keystore.cipher -k "${{ secrets.SIGNING_KEY }}" -md sha256 > zotero.release.keystore

      - name: Decrypt keystore secrets
        run: openssl aes-256-cbc -d -in .github/keystore-secrets.cipher -k "${{ secrets.SIGNING_KEY }}" -md sha256 > keystore-secrets.txt

      - name: Decrypt Google Services
        run: openssl aes-256-cbc -d -in .github/google-services.cipher -k "${{ secrets.SIGNING_KEY }}" -md sha256 > app/google-services.json

      - name: Grant execute permission for scripts and gradle wrapper
        run: |
          chmod +x gradlew
          chmod +x scripts/bundle_translators.py
          chmod +x scripts/bundle_translation.py
          chmod +x scripts/bundle_pdf-worker.py
          chmod +x scripts/bundle_citation_proc.py
          chmod +x scripts/bundle_csl_locales.py
          chmod +x scripts/bundle_styles.py
          chmod +x scripts/bundle_utilities.sh

      - name: Bundle translators
        run: python3 scripts/bundle_translators.py

      - name: Bundle translation
        run: python3 scripts/bundle_translation.py

      - name: Bundle pdf worker
        run: python3 scripts/bundle_pdf-worker.py

      - name: Bundle citation proc
        run: python3 scripts/bundle_citation_proc.py

      - name: Bundle CSL locales
        run: python3 scripts/bundle_csl_locales.py

      - name: Bundle styles
        run: python3 scripts/bundle_styles.py

      - name: Bundle utilities
        run: scripts/bundle_utilities.sh

      - name: Download Android dependencies
        run: ./gradlew androidDependencies --no-configuration-cache

      - name: Publish internal release bundle
        run: ./gradlew --no-configuration-cache -PpreDexLibs=false publishInternalReleaseBundle --stacktrace
